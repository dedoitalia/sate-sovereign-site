<style>
:root {
  --navy:#0a1f3d; --navy-deep:#051026; --blue:#1e4a8a; --blue-soft:#3D6FB8;
  --accent:#af2730; --accent-soft:#c93a44; --gold:#d4a574;
  --bg:#fafbfc; --bg-alt:#f4f6fa; --bg-card:#ffffff;
  --text:#0a1f3d; --text-soft:#4a5568; --text-mute:#718096;
  --border:#e2e8f0; --green:#2f855a;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav{display:flex;align-items:center;justify-content:space-between;height:76px}
.logo{display:flex;align-items:center;gap:14px}
.logo-img{height:32px;width:auto;display:block}
.logo-divider{width:1px;height:28px;background:var(--border)}
.logo-text{display:flex;flex-direction:column;line-height:1.15}
.logo-text strong{font-size:14px;font-weight:700;color:var(--navy);letter-spacing:-0.01em}
.logo-text small{font-size:10px;font-weight:500;color:var(--text-mute);letter-spacing:0.1em;text-transform:uppercase}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a:not(.btn){color:var(--text-soft);font-size:14px;font-weight:500;transition:color .15s}
.nav-links a:not(.btn):hover{color:var(--navy)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-weight:600;font-size:14px;transition:all .2s;cursor:pointer;border:none;text-decoration:none}
a.btn-primary,.btn-primary{background:var(--accent);color:#fff}
a.btn-primary:hover,.btn-primary:hover{background:#8e1f27;color:#fff;transform:translateY(-1px);box-shadow:0 4px 14px rgba(175,39,48,0.3)}
.btn-ghost{background:transparent;color:var(--text-soft);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--navy);color:var(--navy)}

.hero{padding:100px 0 80px;background:var(--navy);position:relative;overflow:hidden;color:#fff;isolation:isolate}
#mesh-canvas{position:absolute;inset:0;z-index:0;width:100%;height:100%;will-change:transform}
.hero-aurora{position:absolute;inset:-20%;z-index:0;pointer-events:none;filter:blur(80px);opacity:0;transition:opacity .4s}
body.no-webgl .hero-aurora{opacity:0.85}
.blob{position:absolute;border-radius:50%;mix-blend-mode:screen;will-change:transform}
.blob-1{width:50vw;height:50vw;background:linear-gradient(135deg,rgba(1,234,160,0.3),rgba(62,111,184,0.2));top:10%;left:-20%;animation:float 20s ease-in-out infinite}
.blob-2{width:40vw;height:40vw;background:linear-gradient(135deg,rgba(175,39,48,0.25),rgba(212,165,116,0.15));top:40%;right:-15%;animation:float 25s ease-in-out infinite 2s}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-60px)}}
.hero-content{position:relative;z-index:1;max-width:900px}
.hero h1{font-size:clamp(28px,6vw,64px);font-weight:700;line-height:1.2;margin-bottom:24px;text-shadow:0 2px 8px rgba(0,0,0,0.2)}
.hero p{font-size:clamp(16px,2.5vw,22px);margin-bottom:32px;opacity:0.95;line-height:1.5}
.hero-cta{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.hero-cta .btn{color:#fff;border:1px solid rgba(255,255,255,0.3)}
.hero-cta .btn:hover{background:rgba(255,255,255,0.1);border-color:#fff}

@media (max-width: 1024px) {
  .hero{padding:80px 0 60px}
  .hero h1{font-size:48px}
  .hero p{font-size:18px}
  .container{padding:0 20px}
}

@media (max-width: 768px) {
  .nav{height:auto;padding:16px 0}
  .logo{flex-shrink:0}
  .logo-img{height:28px}
  .logo-text strong{font-size:12px}
  .logo-text small{font-size:9px}
  .nav-links{flex-direction:column;gap:12px;width:100%;margin-top:16px}
  .nav-links a:not(.btn){font-size:13px}
  .btn{padding:8px 14px;font-size:13px;gap:4px}
  
  .hero{padding:60px 0 50px}
  .hero h1{font-size:32px;margin-bottom:16px}
  .hero p{font-size:15px;margin-bottom:24px}
  .hero-cta{gap:12px}
  .container{padding:0 16px}
}

@media (max-width: 480px) {
  header{border-bottom:none}
  .nav{flex-wrap:wrap;height:auto;padding:12px 0}
  .logo{gap:10px;width:100%;margin-bottom:12px}
  .logo-img{height:24px}
  .logo-text strong{font-size:11px}
  .logo-text small{font-size:8px}
  .nav-links{width:100%;gap:8px}
  .nav-links a:not(.btn){font-size:12px}
  .btn{padding:6px 12px;font-size:12px}
  
  .hero{padding:40px 0 40px}
  .hero h1{font-size:24px;margin-bottom:12px}
  .hero p{font-size:13px;margin-bottom:20px}
  .hero-cta{flex-direction:column}
  .hero-cta .btn{width:100%;justify-content:center}
  .container{padding:0 12px}
  .blob{display:none}
}
</style>
</head>
<body class="no-webgl">
<header class="container">
<div class="nav">
<div class="logo">
<img class="logo-img" src="https://lirp.cdn-website.com/43b57a5e/dms3rep/multi/opt/Logo+-+nuovo-1920w.png" alt="SATE Sovereign" />
<div class="logo-divider"></div>
<div class="logo-text">
<strong>SATE Sovereign</strong>
<small>AI Industriale</small>
</div>
</div>
<div class="nav-links">
<a href="#features">Features</a>
<a href="#pricing">Pricing</a>
<a href="#faq">FAQ</a>
<a href="https://www.sate.eu" class="btn btn-primary">Visit SATE.eu</a>
</div>
</div>
</header>

<section class="hero container">
<canvas id="mesh-canvas"></canvas>
<div class="hero-aurora"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="hero-content">
<h1>Automazione Industriale Potenziata da AI</h1>
<p>Genera codice PLC, robotica e documentazione tecnica in minuti, non settimane. Compatibile con Siemens, B&R, CODESYS, Rockwell e Beckhoff.</p>
<div class="hero-cta">
<a href="#contact" class="btn btn-primary">Inizia Gratis</a>
<a href="https://www.sate.eu" class="btn btn-ghost">Scopri SATE.eu</a>
</div>
</div>
</section>

<script>
(function(){
  if(!window.WebGLRenderingContext){
    document.body.classList.add('no-webgl');
    return;
  }
  document.body.classList.remove('no-webgl');
  const canvas=document.getElementById('mesh-canvas');
  if(!canvas)return;
  const gl=canvas.getContext('webgl');
  if(!gl){
    document.body.classList.add('no-webgl');
    return;
  }
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
  },{passive:true});
})();
</script>
</body>
</html>
